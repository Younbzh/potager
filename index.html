<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mon Potager">
  <meta name="description" content="Gérez votre potager avec le calendrier lunaire biodynamique">

  <title>Mon Potager 🌱</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="app">

  <!-- Header -->
  <header id="app-header">
    <span class="header-title">Mon Potager</span>
  </header>

  <!-- Main content -->
  <main id="app-main">
    <!-- Rendered by app.js -->
    <div class="empty-state">
      <span class="empty-icon">🌱</span>
      <p>Chargement…</p>
    </div>
  </main>

  <!-- Bottom navigation -->
  <nav id="app-nav">
    <button class="nav-btn" id="nav-explorer">
      <span class="nav-icon">🔍</span>
      <span class="nav-label">Explorer</span>
    </button>
    <button class="nav-btn nav-fab-btn" id="nav-quick-add">
      <span class="nav-fab-inner">🌱</span>
    </button>
    <button class="nav-btn" id="nav-profil">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profil</span>
    </button>
  </nav>

</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- App scripts -->
<script src="./plants-data.js"></script>
<script src="./moon.js"></script>
<script src="./db.js"></script>
<script src="./supabase-config.js"></script>
<script src="./sync.js"></script>
<script src="./weather.js"></script>
<script src="./badges.js"></script>
<script src="./tasks.js"></script>
<script src="./app.js"></script>

</body>
</html>
