<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mon Potager">
  <meta name="description" content="Gérez votre potager avec le calendrier lunaire biodynamique">

  <title>Mon Potager 🌱</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="app">

  <!-- Header -->
  <header id="app-header">
    <span class="header-title">Mon Potager</span>
  </header>

  <!-- Main content -->
  <main id="app-main">
    <!-- Rendered by app.js -->
    <div class="empty-state">
      <span class="empty-icon">🌱</span>
      <p>Chargement…</p>
    </div>
  </main>

  <!-- Bottom navigation -->
  <nav id="app-nav">
    <button class="nav-btn active" data-view="home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Accueil</span>
    </button>
    <button class="nav-btn" data-view="plants">
      <span class="nav-icon">🌱</span>
      <span class="nav-label">Plantes</span>
    </button>
    <button class="nav-btn" data-view="tasks">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Tâches</span>
    </button>
    <button class="nav-btn" data-view="moon">
      <span class="nav-icon">🌙</span>
      <span class="nav-label">Lune</span>
    </button>
    <button class="nav-btn" data-view="garden">
      <span class="nav-icon">🗺</span>
      <span class="nav-label">Jardin</span>
    </button>
  </nav>

</div>

<!-- Scripts -->
<script src="./plants-data.js"></script>
<script src="./moon.js"></script>
<script src="./db.js"></script>
<script src="./weather.js"></script>
<script src="./badges.js"></script>
<script src="./tasks.js"></script>
<script src="./app.js"></script>

</body>
</html>
